propositions:
  # The 'propositions' section lists all named conclusions, business rules, and
  # action atoms in this scenario. Compound formulas (implications,
  # equivalences) live here as stipulated rules; modus ponens fires
  # automatically during proof search when their antecedents are derived.
  - BookFlight            # Final action: book a flight.
  - BookHotel             # Final action: book a hotel stay.
  - BookOperaTickets      # Action: secure tickets for an opera performance.
  - BookLouvreReservation # Action: reserve entry to the Louvre museum.
  - StrongCandidateHotel  # Intermediate conclusion: hotel that matches user criteria.
  - PetFriendlyHotel      # Intermediate conclusion: hotel suitable for traveling with a pet.
  - RewardsUpgrade        # (Unused) potential upgrade based on hotel rewards.
  - EuropeanPackageDeal   # Final composite proposition: book a package deal for Europe.

  # Stipulated business rules, declared as compound propositions.
  - ((UserWantsEuropeanFlight ∧ UserHasVisa) → BookFlight)
  - (TravelingWithDog → PetFriendlyHotel)
  - ((UserNeedsPool ∧ UserHasHotelRewards) → StrongCandidateHotel)
  - (UserHasBudget → BookHotel)
  - (UserHasOperaInterest → BookOperaTickets)
  - ((UserWantsCulturalActivities ∧ WantsLouvreVisit) → BookLouvreReservation)
  - (((BookFlight ∨ BookHotel) ∨ BookOperaTickets) → EuropeanPackageDeal)
  - (TravelingWithDog ↔ PetFriendlyHotel)

steps:
  # The 'steps' section runs forward-chaining inference: each step lifts
  # atomic facts/derivations into compound formulas that MP can match.

  # STEP 1: (UserWantsEuropeanFlight ∧ UserHasVisa)
  - rule: alpha
    subtype: and
    from:
      - UserWantsEuropeanFlight
      - UserHasVisa

  # STEP 2: (UserNeedsPool ∧ UserHasHotelRewards)
  - rule: alpha
    subtype: and
    from:
      - UserNeedsPool
      - UserHasHotelRewards

  # STEP 3: (UserWantsCulturalActivities ∧ WantsLouvreVisit)
  - rule: alpha
    subtype: and
    from:
      - UserWantsCulturalActivities
      - WantsLouvreVisit

  # STEP 4: Beta => (BookFlight ∨ BookHotel)
  - rule: beta
    from:
      - BookFlight
      - BookHotel

  # STEP 5: Beta => ((BookFlight ∨ BookHotel) ∨ BookOperaTickets)
  - rule: beta
    from:
      - (BookFlight ∨ BookHotel)
      - BookOperaTickets

  # STEP 6: Contraposition => (~BookHotel → ~UserHasBudget) from (UserHasBudget → BookHotel)
  - rule: contraposition
    from:
      - (UserHasBudget → BookHotel)

  # STEP 7: Double Negation introduction => ~~UserHasVisa
  - rule: doubleNegation
    subtype: introduction
    from:
      - UserHasVisa

  # STEP 8: Modus ponens on the stipulated rule (UserHasBudget → BookHotel)
  # using the atomic UserHasBudget fact. Demonstrates MP as a YAML rule.
  - rule: modusPonens
    from:
      - (UserHasBudget → BookHotel)
      - UserHasBudget

targets:
  - (UserWantsEuropeanFlight ∧ UserHasVisa)
  - ((UserWantsEuropeanFlight ∧ UserHasVisa) → BookFlight)
  - ((BookFlight ∨ BookHotel) ∨ BookOperaTickets)
  - (UserHasBudget → BookHotel)
  - (~BookHotel → ~UserHasBudget)
  - ~~UserHasVisa
  - EuropeanPackageDeal
  - (TravelingWithDog ↔ PetFriendlyHotel)
