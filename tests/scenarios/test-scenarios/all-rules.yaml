propositions:
  # Business rules, stipulated. Action atoms (ActionA..E) are NOT propositions
  # — they are derived via MP/beta from these rules plus resolver facts.
  - ((UserWantsEuropeanFlight ∧ UserHasVisa) → ActionA)
  - (UserWantsEuropeanFlight ↔ ActionC)

steps:
  # Alpha rule - AND
  - rule: alpha
    subtype: and
    from:
      - UserWantsEuropeanFlight
      - UserHasVisa

  # Beta rule - OR (uses ActionA derived via MP from the implication proposition)
  - rule: beta
    from:
      - ActionA
      - ActionB

  # Contraposition (operates on the implication proposition directly)
  - rule: contraposition
    from:
      - ((UserWantsEuropeanFlight ∧ UserHasVisa) → ActionA)

  # Double Negation - Introduction
  - rule: doubleNegation
    subtype: introduction
    from:
      - UserHasVisa

  # Double Negation - Elimination
  - rule: doubleNegation
    subtype: elimination
    from:
      - ~~UserHasVisa

targets:
  - (UserWantsEuropeanFlight ∧ UserHasVisa)
  - ActionA
  - (ActionA ∨ ActionB)
  - (~ActionA → ~(UserWantsEuropeanFlight ∧ UserHasVisa))
  - ~~UserHasVisa
  - (UserWantsEuropeanFlight ↔ ActionC)
