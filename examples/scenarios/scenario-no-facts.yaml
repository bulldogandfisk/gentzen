# yaml-language-server: $schema=../../schemas/scenario.schema.json

propositions:
  # Action atoms and intermediate conclusions.
  - BookFlight
  - BookHotel
  - BookOperaTickets
  - BookLouvreReservation
  - StrongCandidateHotel
  - PetFriendlyHotel
  - RewardsUpgrade
  - EuropeanPackageDeal

  # Stipulated business rules, declared as compound propositions. Modus ponens
  # fires automatically during proof search when antecedents become available.
  - ((UserWantsEuropeanFlight ∧ UserHasVisa) → BookFlight)
  - (TravelingWithDog → PetFriendlyHotel)
  - ((UserNeedsPool ∧ UserHasHotelRewards) → StrongCandidateHotel)
  - (UserHasBudget → BookHotel)
  - (UserHasOperaInterest → BookOperaTickets)
  - ((UserWantsCulturalActivities ∧ WantsLouvreVisit) → BookLouvreReservation)
  - (((BookFlight ∨ BookHotel) ∨ BookOperaTickets) → EuropeanPackageDeal)
  - (TravelingWithDog ↔ PetFriendlyHotel)

steps:
  # STEP 1: (UserWantsEuropeanFlight ∧ UserHasVisa)
  - rule: alpha
    subtype: and
    from:
      - UserWantsEuropeanFlight
      - UserHasVisa

  # STEP 2: (UserNeedsPool ∧ UserHasHotelRewards)
  - rule: alpha
    subtype: and
    from:
      - UserNeedsPool
      - UserHasHotelRewards

  # STEP 3: (UserWantsCulturalActivities ∧ WantsLouvreVisit)
  - rule: alpha
    subtype: and
    from:
      - UserWantsCulturalActivities
      - WantsLouvreVisit

  # STEP 4: Beta => (BookFlight ∨ BookHotel)
  - rule: beta
    from:
      - BookFlight
      - BookHotel

  # STEP 5: Beta => ((BookFlight ∨ BookHotel) ∨ BookOperaTickets)
  - rule: beta
    from:
      - (BookFlight ∨ BookHotel)
      - BookOperaTickets

  # STEP 6: Contraposition => (~BookHotel → ~UserHasBudget)
  - rule: contraposition
    from:
      - (UserHasBudget → BookHotel)

  # STEP 7: Double Negation introduction => ~~UserHasVisa
  - rule: doubleNegation
    subtype: introduction
    from:
      - UserHasVisa

targets:
  - (UserWantsEuropeanFlight ∧ UserHasVisa)
  - ((UserWantsEuropeanFlight ∧ UserHasVisa) → BookFlight)
  - ((BookFlight ∨ BookHotel) ∨ BookOperaTickets)
  - (UserHasBudget → BookHotel)
  - (~BookHotel → ~UserHasBudget)
  - ~~UserHasVisa
  - EuropeanPackageDeal
  - (TravelingWithDog ↔ PetFriendlyHotel)
