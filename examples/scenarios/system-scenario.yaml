# yaml-language-server: $schema=../../schemas/scenario.schema.json

propositions:
  - SystemAlert                                       # stipulated atom (also derivable by MP via the rule below)
  - PerformMaintenance                                # stipulated atom (no rule — engine reports 'asserted')
  - SendNotification                                  # stipulated atom (no rule — engine reports 'asserted')
  - ScheduleBackup                                    # stipulated atom (also derivable by MP via the rule below)
  - ((SystemHealthy ∧ DatabaseConnected) → SystemAlert)  # stipulated rule
  - (BackupCompleted → ScheduleBackup)                # stipulated rule

steps:
  # STEP 1: (SystemHealthy ∧ DatabaseConnected)
  - rule: alpha
    subtype: and
    from:
      - SystemHealthy                                 # resolver
      - DatabaseConnected                             # resolver

  # STEP 2: (SecurityScanPassed ∧ DiskSpaceAvailable)
  - rule: alpha
    subtype: and
    from:
      - SecurityScanPassed                            # resolver
      - DiskSpaceAvailable                            # resolver

targets:
  - (SystemHealthy ∧ DatabaseConnected)               # from step 1 (alpha-AND)
  - ((SystemHealthy ∧ DatabaseConnected) → SystemAlert)  # stipulated rule (engine: 'asserted')
  - (SecurityScanPassed ∧ DiskSpaceAvailable)         # from step 2 (alpha-AND)
