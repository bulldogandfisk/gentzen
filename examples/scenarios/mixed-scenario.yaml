# yaml-language-server: $schema=../../schemas/scenario.schema.json

propositions:
  # Business rules only. Action atoms ProcessOrder, SendAlert, ScheduleMaintenance
  # are derived via MP — not stipulated.
  - ((CustomerIsVIP ∧ PaymentProcessed) → ProcessOrder)
  - ((SystemHealthy ∧ IsBusinessHours) → ScheduleMaintenance)

steps:
  # Business logic: Customer + Payment
  - rule: alpha
    subtype: and
    from:
      - CustomerIsVIP
      - PaymentProcessed

  # System check: Health + Time
  - rule: alpha
    subtype: and
    from:
      - SystemHealthy
      - IsBusinessHours

targets:
  - (CustomerIsVIP AND PaymentProcessed)
  - (SystemHealthy & IsBusinessHours)
  - ProcessOrder
  - ScheduleMaintenance
