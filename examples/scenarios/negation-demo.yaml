# yaml-language-server: $schema=../../schemas/scenario.schema.json
# Negation Demo Scenario
# Shows how to use negation (~) in Gentzen reasoning. Implications are
# declared as compound propositions; alpha-AND lifts atomic facts into
# the compound antecedents that MP fires on.

propositions:
  # Business rules only. Action atoms (AccessDenied, AllowGuestAccess,
  # SystemAvailable) are derived via MP — not stipulated.
  - ((~UserHasPermission ∧ SecurityCheckPassed) → AccessDenied)
  - ((UserIsGuest ∧ ~MaintenanceMode) → AllowGuestAccess)
  - ((SecurityCheckPassed ∧ ~MaintenanceMode) → SystemAvailable)

steps:
  # Build the conjunctions from atomic resolver facts so MP can fire.
  - rule: alpha
    subtype: and
    from:
      - ~UserHasPermission
      - SecurityCheckPassed

  - rule: alpha
    subtype: and
    from:
      - UserIsGuest
      - ~MaintenanceMode

  - rule: alpha
    subtype: and
    from:
      - SecurityCheckPassed
      - ~MaintenanceMode

targets:
  - AccessDenied                           # Should be proven via MP
  - AllowGuestAccess                       # Should be proven via MP
  - SystemAvailable                        # Should be proven via MP
  - (UserIsGuest ∧ ~MaintenanceMode)       # Conjunction with negation
