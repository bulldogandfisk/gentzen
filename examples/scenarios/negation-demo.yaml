# yaml-language-server: $schema=../../schemas/scenario.schema.json
# Negation Demo Scenario
# Shows how to use negation (~) in Gentzen reasoning. Implications are
# declared as compound propositions; alpha-AND lifts atomic facts into
# the compound antecedents that MP fires on.

propositions:
  # Business rules only. Action atoms (AccessDenied, AllowGuestAccess,
  # SystemAvailable) are derived via MP — not stipulated.
  - ((~UserHasPermission ∧ SecurityCheckPassed) → AccessDenied)        # stipulated rule
  - ((UserIsGuest ∧ ~MaintenanceMode) → AllowGuestAccess)              # stipulated rule
  - ((SecurityCheckPassed ∧ ~MaintenanceMode) → SystemAvailable)       # stipulated rule

steps:
  # Build the conjunctions from atomic resolver facts so MP can fire.
  - rule: alpha
    subtype: and
    from:
      - ~UserHasPermission                       # resolver (returns false → closed-world ~Atom)
      - SecurityCheckPassed                      # resolver

  - rule: alpha
    subtype: and
    from:
      - UserIsGuest                              # resolver
      - ~MaintenanceMode                         # resolver (returns false → closed-world ~Atom)

  - rule: alpha
    subtype: and
    from:
      - SecurityCheckPassed                      # resolver
      - ~MaintenanceMode                         # resolver (returns false → closed-world ~Atom)

targets:
  - AccessDenied                                 # MP: step 1 + first stipulated rule
  - AllowGuestAccess                             # MP: step 2 + second stipulated rule
  - SystemAvailable                              # MP: step 3 + third stipulated rule
  - (UserIsGuest ∧ ~MaintenanceMode)             # from step 2 (alpha-AND)
