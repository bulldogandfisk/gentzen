# yaml-language-server: $schema=../../schemas/scenario.schema.json
# Advanced Negation Demo
# Shows double negation, contraposition, and complex negated formulas.
# Implications are declared as compound propositions so MP can fire.

propositions:
  # Business rules only. Action atoms (AllowAccess, GrantFullPermissions)
  # are derived via MP. DenyAccess and RequireAuth are unused vocabulary.
  - (UserIsAdmin → AllowAccess)                              # stipulated rule
  - ((UserIsAdmin ∧ SystemSecure) → GrantFullPermissions)    # stipulated rule

steps:
  # Step 1: Apply double negation elimination (~~DatabaseConnected -> DatabaseConnected)
  - rule: doubleNegation
    subtype: elimination
    from:
      - ~~DatabaseConnected                  # resolver DatabaseConnected → double-negated literal

  # Step 2: Apply contraposition to get (~AllowAccess -> ~UserIsAdmin)
  - rule: contraposition
    from:
      - (UserIsAdmin → AllowAccess)          # stipulated rule (from propositions)

  # Step 3: Combine admin status with security so MP fires on the compound proposition
  - rule: alpha
    subtype: and
    from:
      - UserIsAdmin                          # resolver
      - SystemSecure                         # resolver

targets:
  - DatabaseConnected                        # from step 1 (double-negation elimination)
  - AllowAccess                              # MP: resolver UserIsAdmin + first stipulated rule
  - GrantFullPermissions                     # MP: step 3 + second stipulated rule
  - (~AllowAccess → ~UserIsAdmin)            # from step 2 (contraposition)
  - (UserIsAdmin ∧ SystemSecure)             # from step 3 (alpha-AND)
