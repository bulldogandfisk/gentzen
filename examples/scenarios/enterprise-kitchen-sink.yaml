# yaml-language-server: $schema=../../schemas/scenario.schema.json
# ============================================================================
# ENTERPRISE KITCHEN SINK SCENARIO
# ============================================================================
#
# Comprehensive demo of every logical construct supported by the engine.
# Models an enterprise order processing and risk management workflow.
#
# Multi-target product: a scenario run reports per-target proven/not-proven
# status across many candidate actions. Consumers iterate results.targets[]
# to decide which actions are justified by current world state.
#
# Implications and equivalences are declared as compound propositions
# (stipulated business rules); modus ponens fires automatically during
# proof search when antecedents become available via resolver facts and
# the alpha-AND steps below.
# ============================================================================

propositions:
  # Action atoms (ProcessOrder, ApplyFraudHold, InitiateAMLCheck, etc.) are
  # NOT propositions — they are derived via MP from the business rules below
  # combined with resolver facts. Listing them here would make them trivially
  # "available" regardless of world state, which is the exact bug we
  # explicitly guard against by reporting derivation: 'asserted'.

  # Business rules: stipulated implications.
  - (((CustomerIdentityVerified ∧ CustomerInGoodStanding) ∧ (PaymentMethodValid ∧ SufficientFunds)) → ProcessOrder)  # stipulated rule
  - (HighRiskTransaction → ApplyFraudHold)                                  # stipulated rule
  - (TransactionExceedsThreshold → InitiateAMLCheck)                        # stipulated rule
  - ((SystemUnderHighLoad ∧ PerformanceDegraded) → ScaleInfrastructure)     # stipulated rule
  - (((CustomerIdentityVerified ∧ CustomerInGoodStanding) ∧ (InventoryAvailable ∧ ShippingCapacityAvailable)) → (ProcessOrder ∧ SendConfirmationEmail))  # stipulated rule
  - ((~PrimarySystemsOnline ∨ ~DatabaseConnected) → (ActivateFailover ∨ TriggerMaintenanceMode))  # stipulated rule

  # Business equivalences, declared as propositions.
  - ((CustomerIdentityVerified ∧ CustomerInGoodStanding) ↔ (PaymentMethodValid ∧ SufficientFunds))  # stipulated equivalence
  - (SystemHealthy ↔ (PrimarySystemsOnline ∧ DatabaseConnected))            # stipulated equivalence

steps:
  # ========================================================================
  # SECTION 1: BASIC CONJUNCTIONS (lift atomic facts into compound antecedents)
  # ========================================================================

  # STEP 1: Customer Verification Foundation
  - rule: alpha
    subtype: and
    from:
      - CustomerIdentityVerified                      # resolver
      - CustomerInGoodStanding                        # resolver

  # STEP 2: Payment Method Validation
  - rule: alpha
    subtype: and
    from:
      - PaymentMethodValid                            # resolver
      - SufficientFunds                               # resolver

  # STEP 3: Inventory Readiness Check
  - rule: alpha
    subtype: and
    from:
      - InventoryAvailable                            # resolver
      - ShippingCapacityAvailable                     # resolver

  # STEP 4: System Health Foundation
  - rule: alpha
    subtype: and
    from:
      - PrimarySystemsOnline                          # resolver
      - DatabaseConnected                             # resolver

  # STEP 5: System Load Conjunction
  - rule: alpha
    subtype: and
    from:
      - SystemUnderHighLoad                           # resolver
      - PerformanceDegraded                           # resolver

  # STEP 6: Customer + Payment combined (matches the ProcessOrder rule's antecedent)
  - rule: alpha
    subtype: and
    from:
      - (CustomerIdentityVerified ∧ CustomerInGoodStanding)  # from step 1 (alpha-AND)
      - (PaymentMethodValid ∧ SufficientFunds)               # from step 2 (alpha-AND)

  # STEP 7: Customer + Inventory combined (matches the workflow rule's antecedent)
  - rule: alpha
    subtype: and
    from:
      - (CustomerIdentityVerified ∧ CustomerInGoodStanding)  # from step 1 (alpha-AND)
      - (InventoryAvailable ∧ ShippingCapacityAvailable)     # from step 3 (alpha-AND)

  # ========================================================================
  # SECTION 2: ALTERNATIVE PATHWAYS (Beta Rule - OR Logic)
  # ========================================================================

  # STEP 8: Payment Processing Alternatives
  - rule: beta
    from:
      - ChargePayment                                 # no resolver — step skipped
      - EscrowFunds                                   # no resolver — step skipped

  # STEP 9: Order Resolution Pathways
  - rule: beta
    from:
      - (ChargePayment ∨ EscrowFunds)                 # from step 8 (if it fires)
      - RequireManualReview                           # no resolver — step skipped

  # STEP 10: System Recovery Options
  - rule: beta
    from:
      - ActivateFailover                              # action atom — no resolver, no upstream derivation; step skipped
      - TriggerMaintenanceMode                        # action atom — no resolver, no upstream derivation; step skipped

  # ========================================================================
  # SECTION 3: CONTRAPOSITION (Logical Inversion)
  # ========================================================================

  # STEP 11: Risk Assessment via Contraposition on the stipulated rule
  - rule: contraposition
    from:
      - (HighRiskTransaction → ApplyFraudHold)        # stipulated rule (proposition)

  # STEP 12: Compliance Verification via Contraposition
  - rule: contraposition
    from:
      - (TransactionExceedsThreshold → InitiateAMLCheck)  # stipulated rule (proposition)

  # ========================================================================
  # SECTION 4: DOUBLE NEGATION
  # ========================================================================

  # STEP 13: Customer Status Normalization
  - rule: doubleNegation
    subtype: elimination
    from:
      - ~~CustomerInGoodStanding                      # resolver CustomerInGoodStanding → double-negated literal

  # STEP 14: Risk Flag Clarification
  - rule: doubleNegation
    subtype: introduction
    from:
      - SystemUnderHighLoad                           # resolver

# ----------------------------------------------------------------------------
# TARGETS: Per-Target Verdicts
# ----------------------------------------------------------------------------
# A scenario run reports proven/not-proven for each of these independently.
# That per-target table is the product — not a single yes/no verdict.

targets:
  # Conjunction Targets
  - (CustomerIdentityVerified ∧ CustomerInGoodStanding)        # from step 1 (alpha-AND)
  - (PaymentMethodValid AND SufficientFunds)                   # from step 2 (alpha-AND)
  - (InventoryAvailable & ShippingCapacityAvailable)           # from step 3 (alpha-AND)
  - (PrimarySystemsOnline ∧ DatabaseConnected)                 # from step 4 (alpha-AND)

  # Business rule (implication) targets
  - (HighRiskTransaction → ApplyFraudHold)                                  # stipulated rule (engine: 'asserted')
  - (TransactionExceedsThreshold IMPLIES InitiateAMLCheck)                  # stipulated rule (engine: 'asserted')
  - (((CustomerIdentityVerified ∧ CustomerInGoodStanding) ∧ (PaymentMethodValid ∧ SufficientFunds)) → ProcessOrder)  # stipulated rule (engine: 'asserted')

  # Disjunction Targets
  - (ChargePayment ∨ EscrowFunds)                              # step 8 skipped (no resolvers for disjuncts)
  - ((ChargePayment ∨ EscrowFunds) ∨ RequireManualReview)      # step 9 skipped
  - (ActivateFailover | TriggerMaintenanceMode)                # MP via emergency rule (if antecedent disjunction true)

  # Contraposition Targets
  - (~ApplyFraudHold → ~HighRiskTransaction)                   # from step 11 (contraposition)
  - (~InitiateAMLCheck → ~TransactionExceedsThreshold)         # from step 12 (contraposition)

  # Double Negation Targets
  - CustomerInGoodStanding                                     # resolver (also from step 13 via ~~elim)
  - ~~SystemUnderHighLoad                                      # from step 14 (double-negation introduction)

  # Equivalence Targets
  - ((CustomerIdentityVerified ∧ CustomerInGoodStanding) ↔ (PaymentMethodValid ∧ SufficientFunds))  # stipulated equivalence (engine: 'asserted')
  - (SystemHealthy <-> (PrimarySystemsOnline ∧ DatabaseConnected))                                  # stipulated equivalence (engine: 'asserted')

  # Complex business workflow Targets
  - ((CustomerIdentityVerified ∧ CustomerInGoodStanding) ∧ (InventoryAvailable ∧ ShippingCapacityAvailable))  # from step 7 (alpha-AND)
  - (ProcessOrder ∧ SendConfirmationEmail)                                  # MP: step 7 + workflow rule
  - (((CustomerIdentityVerified ∧ CustomerInGoodStanding) ∧ (InventoryAvailable ∧ ShippingCapacityAvailable)) → (ProcessOrder ∧ SendConfirmationEmail))  # stipulated rule (engine: 'asserted')

  # Emergency Response Targets
  - (~PrimarySystemsOnline ∨ ~DatabaseConnected)               # requires negation of a resolver atom (likely blocked)
  - (ActivateFailover ∨ TriggerMaintenanceMode)                # MP via emergency rule (if antecedent disjunction true)
  - ((~PrimarySystemsOnline ∨ ~DatabaseConnected) → (ActivateFailover ∨ TriggerMaintenanceMode))  # stipulated rule (engine: 'asserted')

  # Business Action Targets (these will report derivation='asserted' or 'inference'
  # depending on whether they're trivially declared or derived via MP)
  - ProcessOrder                                               # MP: step 6 + ProcessOrder rule
  - RequireManualReview                                        # no resolver, no rule produces it — blocked
  - ApplyFraudHold                                             # MP: resolver HighRiskTransaction + stipulated rule
  - InitiateAMLCheck                                           # MP: resolver TransactionExceedsThreshold + stipulated rule
  - ScaleInfrastructure                                        # MP: step 5 + ScaleInfrastructure rule
  - SendConfirmationEmail                                      # ∧-elim from (ProcessOrder ∧ SendConfirmationEmail), itself MP from step 7
